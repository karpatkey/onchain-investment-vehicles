[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Pinned to match the solc version baked into the deployed KpkSharesDeployer bytecode.
# Don't bump without redeploying KpkSharesDeployer + KpkOivFactory.
solc_version = "0.8.34"
fs_permissions = [
  { access = "read-write", path = "script" },
  { access = "read-write", path = "out" },
]
ffi = true
ast = true
build_info = true
extra_output = ["storageLayout"]


# Default behaviour changed on commit https://github.com/foundry-rs/foundry/commit/39f13df8971b02f5961d4fd2cb278f44e19a717a
optimizer = true
optimizer_runs = 2000
via_ir = true

no_match_test = "upgrade"

[profile.coverage]
# Exclude script folder from coverage reports (regex pattern)
no_match_coverage = "^script/"

[rpc_endpoints]
mainnet  = "${MAINNET_URL}"
sepolia  = "${SEPOLIA_URL}"
gnosis   = "${GNOSIS_URL}"
arbitrum = "${ARBITRUM_URL}"
base     = "${BASE_URL}"
optimism = "${OP_URL}"

[etherscan]
# Etherscan v2 multichain API key — one key covers mainnet, optimism, base, arbitrum, gnosis, sepolia.
mainnet  = { key = "${ETHERSCAN_API_KEY}" }
optimism = { key = "${ETHERSCAN_API_KEY}" }
arbitrum = { key = "${ETHERSCAN_API_KEY}" }
base     = { key = "${ETHERSCAN_API_KEY}" }
gnosis   = { key = "${ETHERSCAN_API_KEY}" }
sepolia  = { key = "${ETHERSCAN_API_KEY}" }